<!DOCTYPE html>
<html>
<head>
    <title>LBS College AI Chatbot</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            width: 100%;
            overflow: hidden;
            position: relative;
        }
        
        /* Background image with overlay */
        .home-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("{{ url_for('static', filename='lbs.jpg') }}");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }
        
        /* Dark overlay for better text visibility */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.5) 100%);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        /* Glass morphism card */
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 50px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            width: 550px;
            max-width: 90%;
            animation: fadeInUp 0.8s ease-out;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .title {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            color: #2d3748;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            color: #4a5568;
            margin-bottom: 30px;
            line-height: 1.8;
            font-size: 16px;
        }
        
        .start-btn {
            padding: 14px 35px;
            border: none;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 16px;
            font-weight: 500;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            font-family: 'Poppins', sans-serif;
        }
        
        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }
        
        /* Feature badges */
        .features {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        
        .feature {
            background: rgba(102, 126, 234, 0.1);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 12px;
            color: #667eea;
            font-weight: 500;
        }
        
        /* Responsive design */
        @media (max-width: 768px) {
            .glass-card {
                padding: 35px 25px;
                width: 90%;
            }
            
            .title {
                font-size: 24px;
            }
            
            .subtitle {
                font-size: 14px;
            }
            
            .feature {
                font-size: 10px;
                padding: 5px 12px;
            }
        }
        
        /* Optional: Add a subtle pulse animation to the button */
        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(102, 126, 234, 0.7);
            }
            70% {
                box-shadow: 0 0 0 10px rgba(102, 126, 234, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(102, 126, 234, 0);
            }
        }
        
        .start-btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>
    <div class="home-bg"></div>
    <div class="overlay">
        <div class="glass-card">
            <h1 class="title">Welcome to LBS AI Assistant! 🤖</h1>
            <p class="subtitle">
                Your intelligent companion for all things LBS College of Engineering.<br>
                Get instant answers about admissions, courses, placements, and more, 24/7!
            </p>
            <a href="/chat">
                <button class="start-btn">Start Conversation →</button>
            </a>
            <div class="features">
                <span class="feature">📚 Courses & Programs</span>
                <span class="feature">💰 Fee Structure</span>
                <span class="feature">🏆 Placements</span>
                <span class="feature">🏠 Hostel Facilities</span>
            </div>
        </div>
    </div>
</body>
</html>
