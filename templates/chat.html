<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>LBS AI Chatbot</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* Background */

body{
margin:0;
font-family:'Poppins',sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#667eea,#764ba2,#6dd5ed,#2193b0);
background-size:400% 400%;
animation:gradientMove 10s ease infinite;
}

/* gradient animation */

@keyframes gradientMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* Chat card */

.chat-card{
width:450px;
height:650px;
backdrop-filter:blur(15px);
background:rgba(255,255,255,0.15);
border-radius:20px;
box-shadow:0 25px 45px rgba(0,0,0,0.2);
display:flex;
flex-direction:column;
overflow:hidden;
}

/* Header */

.chat-header{
padding:18px;
text-align:center;
color:white;
font-size:20px;
font-weight:500;
border-bottom:1px solid rgba(255,255,255,0.2);
}

/* Chat messages */

.chat-box{
flex:1;
padding:20px;
overflow-y:auto;
display:flex;
flex-direction:column;
}

/* Message bubble */

.message{
padding:12px 16px;
border-radius:20px;
margin:8px 0;
max-width:75%;
animation:fadeIn .4s ease;
}

/* User */

.user{
align-self:flex-end;
background:#ffffff;
color:#333;
border-bottom-right-radius:5px;
}

/* Bot */

.bot{
align-self:flex-start;
background:#222;
color:white;
border-bottom-left-radius:5px;
}

/* Fade animation */

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* Input area */

.chat-input{
display:flex;
padding:15px;
gap:10px;
background:rgba(255,255,255,0.2);
}

/* Input box */

.chat-input input{
flex:1;
padding:12px;
border:none;
border-radius:30px;
outline:none;
font-size:14px;
}

/* Send button */

.chat-input button{
width:45px;
height:45px;
border:none;
border-radius:50%;
background:#ffffff;
cursor:pointer;
font-size:18px;
transition:.2s;
}

.chat-input button:hover{
transform:scale(1.1);
}

/* typing animation */

.typing{
width:50px;
display:flex;
justify-content:space-between;
}

.typing span{
width:8px;
height:8px;
background:white;
border-radius:50%;
animation:bounce 1.2s infinite;
}

.typing span:nth-child(2){
animation-delay:.2s;
}

.typing span:nth-child(3){
animation-delay:.4s;
}

@keyframes bounce{
0%,80%,100%{transform:scale(0);}
40%{transform:scale(1);}
}

/* Mobile */

@media(max-width:500px){

.chat-card{
width:95%;
height:95vh;
}

}

</style>

</head>


<body>

<div class="chat-card">

<div class="chat-header">
<a href="/" class="home-btn">🏠 Home</a>
🤖 LBS College AI Assistant
</div>

<div class="chat-box" id="chatBox">

{% for sender, message in chat_history %}

<div class="message {{ 'user' if sender == 'You' else 'bot' }}">
{{ message }}
</div>

{% endfor %}

</div>

<form method="POST" class="chat-input">

<input type="text" name="message" placeholder="Ask something..." required>

<button type="submit">➤</button>

</form>

</div>

<script>

/* Auto scroll */

const chatBox=document.getElementById("chatBox");
chatBox.scrollTop=chatBox.scrollHeight;

</script>

</body>

</html>
