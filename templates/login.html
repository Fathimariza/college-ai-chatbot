<!DOCTYPE html>
<html>
<head>
    <title>Login / Signup</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body class="home-bg">

<div class="overlay">

    <h1 style="text-align:center; color:white;">College AI Chatbot</h1>

    <div class="glass-card">

        <h2 class="title" id="form-title">Login</h2>

        <!-- LOGIN FORM -->
        <form id="loginForm" action="/login" method="POST">
            <input type="email" name="email" placeholder="Enter Email" required>
            <input type="password" name="password" placeholder="Enter Password" required>
            <button class="start-btn" type="submit">Login</button>
        </form>

        <!-- SIGNUP FORM -->
        <form id="signupForm" action="/signup" method="POST" style="display:none;">
            <input type="text" name="name" placeholder="Enter Name" required>
            <input type="email" name="email" placeholder="Enter Email" required>
            <input type="password" name="password" placeholder="Enter Password" required>
            <button class="start-btn" type="submit">Signup</button>
        </form>

        <p id="toggleText">
            Don't have an account? 
            <span onclick="toggleForm()">Signup</span>
        </p>

    </div>

</div>

<script>
function toggleForm() {
    let loginForm = document.getElementById("loginForm");
    let signupForm = document.getElementById("signupForm");
    let title = document.getElementById("form-title");
    let text = document.getElementById("toggleText");

    if (loginForm.style.display === "none") {
        loginForm.style.display = "block";
        signupForm.style.display = "none";
        title.innerText = "Login";
        text.innerHTML = `Don't have an account? <span onclick="toggleForm()">Signup</span>`;
    } else {
        loginForm.style.display = "none";
        signupForm.style.display = "block";
        title.innerText = "Signup";
        text.innerHTML = `Already have an account? <span onclick="toggleForm()">Login</span>`;
    }
}
</script>

</body>
</html>
